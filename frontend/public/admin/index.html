<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Raspe SOL: raspadinha digital baseada em blockchain Solana com lotes auditáveis."
    />
    <title>Raspe SOL</title>

    <style>
      #lang-switcher {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 9999;
        display: flex;
        gap: 6px;
      }
      #lang-switcher button {
        font-size: 22px;
        background: #1f1f1f;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 4px 6px;
        cursor: pointer;
      }
      #lang-switcher button.active {
        border-color: #7C3AED; /* roxo do Raspe SOL */
      }
    </style>
  </head>
  <body>
    <!-- Bandeiras ficam aqui em cima de tudo -->
    <div id="lang-switcher"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      const languages = [
        { code: 'pt', flag: '🇧🇷' },
        { code: 'en', flag: '🇺🇸' },
        { code: 'zh', flag: '🇨🇳' }
      ];
      const currentLang = localStorage.getItem('lang') || 'pt';
      const container = document.getElementById('lang-switcher');

      languages.forEach(l => {
        const btn = document.createElement('button');
        btn.innerText = l.flag;
        if(l.code === currentLang) btn.classList.add('active');
        btn.onclick = () => {
          localStorage.setItem('lang', l.code);
          window.location.reload();
        };
        container.appendChild(btn);
      });
    </script>
  </body>
</html>
