backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'Cria {{collection}} "{{slug}}"'
    update: 'Atualiza {{collection}} "{{slug}}"'
    delete: 'Deleta {{collection}} "{{slug}}"'

media_folder: "public/images"
public_folder: "/images"

collections:
    - name: "produtos"
    label: "Produtos"
    label_singular: "Produto"
    folder: "content/produtos"
    create: true
    slug: "{{slug}}"
    fields:
            - {label: "Nome", name: "title", widget: "string"}
            - {label: "Preço em SOL", name: "preco", widget: "number", value_type: "float"}
            - {label: "Imagem", name: "image", widget: "image"}
            - {label: "Descrição", name: "body", widget: "text"}
            - {label: "Ativo", name: "ativo", widget: "boolean", default: true}
